<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>商业模式分析框架_消费品版</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; margin: 0; background: #fffdf8; color: #1f2937; }
      main { max-width: 860px; margin: 0 auto; padding: 48px 28px 64px; }
      .card { background: white; border: 1px solid #eadfc4; border-radius: 18px; padding: 20px; margin-top: 16px; }
      h1 { font-size: 32px; }
      h2 { font-size: 19px; margin: 0 0 12px; }
      li { margin: 8px 0; }
    </style>
  </head>
  <body>
    <main>
      <h1>商业模式分析框架</h1>
      <div class="card">
        <h2>1. 收入模型</h2>
        <ul>
          <li>单品结构：高毛利主推 SKU / 低毛利引流 SKU / 配件复购 SKU</li>
          <li>渠道拆解：自营平台、分销、线下零售、内容转化</li>
          <li>用户生命周期：首购、复购、交叉销售、会员化</li>
        </ul>
      </div>
      <div class="card">
        <h2>2. 成本结构</h2>
        <ul>
          <li>生产端：原材料、OEM 议价、良率、返修率</li>
          <li>履约端：仓配成本、售后成本、退换货损耗</li>
          <li>销售端：投流获客、品牌联名、达人分佣</li>
        </ul>
      </div>
      <div class="card">
        <h2>3. 护城河判断</h2>
        <ul>
          <li>产品力是否来自设计/供应链/品牌心智，而非单纯流量。</li>
          <li>复购与 NPS 是否支持从爆品逻辑升级为品牌逻辑。</li>
          <li>是否具备跨品类扩张时的用户迁移能力。</li>
        </ul>
      </div>
    </main>
  </body>
  </html>
